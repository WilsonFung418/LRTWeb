<style>
body {

/* Navbar */

/* 天氣按鈕樣式 */
#weather-toggle-btn {
  border: 2px solid rgba(255, 255, 255, 0.3);

  display: inline-flex;

#weather-toggle-btn:hover {

}

#weather-toggle-btn:active {
  transform: scale(0.95);
}

}

/* Loader */
#loader {

  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,0.96);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  flex-direction: column;
  transition: opacity 0.3s ease-out;
}
.spinner {
  width: 48px;
  height: 48px;
  border: 5px solid transparent;
  border-top-color: #ff6f61;
  border-right-color: #6bc4e8;
  border-bottom-color: #feca57;
  border-left-color: #ff9ff3;
  border-radius: 50%;

}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.loader-text {
  font-size: 1.05rem;
  font-weight: 500;
  color: #ff6f61;
  letter-spacing: 0.5px;

}
@keyframes fadeInOut {

#table table {

// ==============================

// --- LRT stations ---
const lrtStations = [
  { id: '220', name: '大興(南)', lat: 22.40281821611273, lng: 113.97203523032393 },
  { id: '100', name: '兆康', lat: 22.412013954554574, lng: 113.97839328454653 },
  { id: '295', name: '屯門', lat: 22.39405653737988, lng: 113.97288393949789 },
  { id: '280', name: '市中心', lat: 22.391473888531404, lng: 113.97497385511649 },
  { id: '270', name: '安定', lat: 22.387940178705854, lng: 113.97505852639564 },
  { id: '560', name: '水邊圍', lat: 22.444617253662155, lng: 114.01989951173945 },
  { id: '570', name: '豐年路', lat: 22.444738245990856, lng: 114.02376243265216 },
  { id: '580', name: '康樂路', lat: 22.444711482540036, lng: 114.02717108105638 },
  { id: '590', name: '大棠路', lat: 22.44477799854364, lng: 114.02892926571472 },
  { id: '600', name: '元朗', lat: 22.446001529588745, lng: 114.0338110969568 },
  { id: '430', name: '天水圍', lat: 22.44846730647476, lng: 114.00457100528374 },
  { id: '460', name: '天瑞', lat: 22.45622127702453, lng: 113.99952845264237 },
  { id: '480', name: '天富', lat: 22.464647436539735, lng: 113.99765969796667 },
  { id: '468', name: '頌富', lat: 22.462368618188663, lng: 113.99706082055354 },
  { id: '070', name: '河田', lat: 22.39765662761687, lng: 113.97307721001496 },
  { id: '080', name: '澤豐', lat: 22.404192792969063, lng: 113.97606465419265 }
];

// --- LRT API Configuration ---
const LRT_API_BASE_URL = 'https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule';
const LRT_API_TIMEOUT = 5000; // 5 seconds in milliseconds

// --- Cache & state ---
let tableCache = { id: null, tableData: null, systemTime: '', timestamp: 0 };
const cacheDuration = 5000; // 5秒緩存
let lastPosition = null;
let manualSelection = false;

// ==============================
// 工具函數
// ==============================

/**
 * HTML 轉義函數（安全處理）
 * @param {string} text
 * @return {string}
 */
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLng / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function findNearestStation(userLat, userLng) {
  let nearest = lrtStations[0], minDistance = Infinity;
  lrtStations.forEach(station => {
    const distance = getDistance(userLat, userLng, station.lat, station.lng);
    if (distance < minDistance) {
      minDistance = distance;
      nearest = station;
    }
  });
  return nearest;
}

// --- Loader helpers ---
function showLoader(text = "輕鐵數據載入中…") {
  const loader = document.getElementById('loader');
  const loaderText = loader.querySelector('.loader-text');
  loaderText.textContent = text;
  loader.style.display = 'flex';
  loader.style.opacity = '1';
}

function hideLoader() {
  const loader = document.getElementById('loader');
  loader.style.opacity = '0';
  setTimeout(() => loader.style.display = 'none', 300);
}

// --- Get URL parameter ---
function getParameterByName(name, url = window.location.href) {
  name = name.replace(/[[\]]/g, "\\$&");
  const regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)");
  const results = regex.exec(url);
  return results ? decodeURIComponent(results[2]?.replace(/\+/g, " ") || "no") : null;
}

// --- Debounce ---
function debounce(func, wait) {
  let timeout;
  return function (...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  };
}

// LRT Schedule API Functions
// ==============================

/**
 * 從 API 獲取輕鐵數據
 * @param {string} stationId
 * @return {Promise<Object|null>}
 */
async function fetchLrtData(stationId) {
    const url = `${LRT_API_BASE_URL}?station_id=${encodeURIComponent(stationId)}&_=${Date.now()}`;
    
    // 設置超時控制
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), LRT_API_TIMEOUT);
    
    try {
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'User-Agent': 'JavaScript-LRT-Schedule/1.0',
                'Accept': 'application/json',
                'Cache-Control': 'no-cache, no-store, must-revalidate',
                'Pragma': 'no-cache'
            },
            signal: controller.signal,
            cache: 'no-store'
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
            console.error(`API request failed with status: ${response.status}`);
            return null;
        }
        
        const data = await response.json();
        
        // 檢查 API 響應狀態
        if (!data || data.status !== 1) {
            console.error('Invalid API response format or status');
            return null;
        }
        
        return data;
    } catch (error) {
        clearTimeout(timeoutId);
        console.error('Failed to fetch LRT data:', error);
        return null;
    }
}

/**
 * 生成 HTML 表格
 * @param {Object|null} data
 * @return {string}
 */
function generateLrtTable(data) {
    if (!data || !data.platform_list || data.platform_list.length === 0) {
        return '<table class="table table-hover table-responsive" style="width:100%;"><tbody><tr><td colspan="4" class="text-center">無可用數據</td></tr></tbody></table>';
    }

    let output = '<table class="table table-hover table-responsive" style="width:100%;">';
    output += '<thead><tr class="table-secondary"><th>路綫</th><th>目的地</th><th>車卡數</th><th>下一班車</th></tr></thead><tbody>';

    data.platform_list.forEach(platform => {
        const platformId = escapeHtml(platform.platform_id || 'N/A');
        output += `<tr><td colspan='4' class='table-primary text-center'><strong>月台: ${platformId}</strong></td></tr>`;

        (platform.route_list || []).forEach(route => {
            const routeNo = escapeHtml(route.route_no || 'N/A');
            const destCh = escapeHtml(route.dest_ch || 'N/A');
            const timeCh = escapeHtml(route.time_ch || 'N/A');
            const trainImg = route.train_length ? escapeHtml(route.train_length) : '';
            const trainImgTag = trainImg ? 
                `<img src="${trainImg}.png" alt="train" loading="lazy" style="max-height:24px;">` : 
                '-';

            output += `<tr><td><strong>${routeNo}</strong></td><td>${destCh}</td><td>${trainImgTag}</td><td><strong>${timeCh}</strong></td></tr>`;
        });
    });

    output += '</tbody></table>';
    return output;
}

async function refreshMessages(id = null, forceGeo = false) {
  const errorMessage = document.getElementById('error-message');
  const tableContainer = document.getElementById('table');
  const lastUpdate = document.getElementById('lastUpdate');
  const stationNameEl = document.getElementById('station-name');
  const navLinks = document.querySelectorAll('.navbar-nav .nav-link');
  const now = Date.now();

  let stationId = id || getParameterByName('id');
  let stationName = getParameterByName('name') || '大興(南)';

  // --- Geo-location ---
  if ((!stationId || forceGeo) && !manualSelection) {
    try {
      showLoader("定位中…");
      const position = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 30000 });
      });
      const newPosition = position.coords;
      const nearestStation = findNearestStation(newPosition.latitude, newPosition.longitude);
      stationId = nearestStation.id;
      stationName = nearestStation.name;
      lastPosition = newPosition;
      navLinks.forEach(link => link.classList.remove('active'));
      document.querySelector(`.nav-link[data-id="geolocation"]`).classList.add('active');
      history.replaceState(null, '', `?id=${stationId}&name=${encodeURIComponent(stationName)}`);
      hideLoader();
    } catch (error) {
      console.error('Geolocation failed:', error);
      stationId = '220';
      stationName = '大興(南)';
      navLinks.forEach(link => link.classList.remove('active'));
      document.querySelector(`.nav-link[data-id="220"]`).classList.add('active');
      errorMessage.textContent = '無法獲取位置，使用預設站點：大興(南)';
      errorMessage.style.display = 'block';
      hideLoader();
    }
  }

  // --- Manual selection ---
  if (stationId && manualSelection) {
    const station = lrtStations.find(s => s.id === stationId);
    if (station) {
      stationName = station.name;
      navLinks.forEach(link => link.classList.remove('active'));
      document.querySelector(`.nav-link[data-id="${stationId}"]`).classList.add('active');
    } else {
      stationId = '220';
      stationName = '大興(南)';
      navLinks.forEach(link => link.classList.remove('active'));
      document.querySelector(`.nav-link[data-id="220"]`).classList.add('active');
    }
  }

  stationNameEl.textContent = stationName;

  // --- Check cache ---
  if (tableCache.id === stationId && tableCache.tableData && (now - tableCache.timestamp) < cacheDuration && !forceGeo) {
    requestAnimationFrame(() => {
      tableContainer.innerHTML = tableCache.tableData;
      lastUpdate.textContent = tableCache.systemTime ? "最後更新時間: " + tableCache.systemTime : '';
      hideLoader();
    });
    return;
  }

  try {
    if (!tableContainer.innerHTML || tableCache.id !== stationId) showLoader();

    // 從 API 直接獲取數據
    const data = await fetchLrtData(stationId);
    
    if (!data) {
      // 顯示錯誤訊息
      errorMessage.innerHTML = '<div style="text-align:center;color:#ff6f61;font-size:1rem;font-weight:500;margin:1rem;padding:0.75rem;background:#fff;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);">無法載入輕鐵數據，請稍後再試！</div>';
      errorMessage.style.display = 'block';
      
      // 嘗試顯示緩存數據（如果有的話）
      if (tableCache.id === stationId && tableCache.tableData) {
        tableContainer.innerHTML = tableCache.tableData;
        lastUpdate.textContent = tableCache.systemTime ? "最後更新時間: " + tableCache.systemTime : '';
      }
    } else {
      // 生成表格
      const tableHtml = generateLrtTable(data);
      const systemTime = data.system_time || '';
      
      // 更新顯示
      tableContainer.style.opacity = '0';
      tableContainer.innerHTML = tableHtml;
      tableContainer.style.opacity = '1';
      
      // 更新最後更新時間
      if (systemTime) {
        lastUpdate.textContent = `最後更新時間: ${escapeHtml(systemTime)}`;
      } else {
        lastUpdate.textContent = '';
      }
      
      // 清除錯誤訊息
      errorMessage.style.display = 'none';
      
      // 緩存數據
      tableCache = {
        id: stationId,
        tableData: tableHtml,
        systemTime: systemTime,
        timestamp: Date.now()
      };
    }
  } catch (error) {
    console.error('Failed to load table data:', error);
    errorMessage.innerHTML = '<div style="text-align:center;color:#ff6f61;font-size:1rem;font-weight:500;margin:1rem;padding:0.75rem;background:#fff;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);">無法載入輕鐵數據，請稍後再試！</div>';
    errorMessage.style.display = 'block';
    if (tableCache.id === stationId && tableCache.tableData) {
      tableContainer.innerHTML = tableCache.tableData;
      lastUpdate.textContent = tableCache.systemTime ? "最後更新時間: " + tableCache.systemTime : '';
    }
  } finally {
    hideLoader();
  }
}

// 用於存儲計時器的變量
let weatherModalAutoHideTimer = null;
let weatherModalScrollTimer = null;
let isUserScrolling = false;
let currentWeatherModal = null;

function showWeatherModal() {
  console.log('🌤️ 開始獲取天氣數據...');
  
  // 檢查Bootstrap是否已加載
  if (typeof bootstrap === 'undefined') {
    console.log('⏳ 等待Bootstrap加載...');
    setTimeout(showWeatherModal, 500);
    return;
  }
  
  // 清除可能存在的舊計時器
  if (weatherModalAutoHideTimer) {
    clearTimeout(weatherModalAutoHideTimer);
    weatherModalAutoHideTimer = null;
  }
  if (weatherModalScrollTimer) {
    clearTimeout(weatherModalScrollTimer);
    weatherModalScrollTimer = null;
  }
  
  // 重置滾動狀態
  isUserScrolling = false;
  
  // 顯示加載狀態
  document.getElementById('temperatureValue').textContent = '...';
  document.getElementById('weatherGeneral').textContent = '獲取數據中...';
  document.getElementById('weatherForecast').textContent = '請稍候...';
  document.getElementById('weatherOutlook').textContent = '載入中...';
  document.getElementById('temperatureTime').textContent = '更新時間：連接中...';
  
  // 使用Promise.all同時獲取兩個API數據
  Promise.all([
    fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc&_=' + Date.now()),
    fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=tc&_=' + Date.now())
  ])
  .then(responses => {
    // 檢查響應狀態
    if (!responses[0].ok || !responses[1].ok) {
      throw new Error('天氣API請求失敗');
    }
    return Promise.all(responses.map(r => r.json()));
  })
  .then(([currentData, forecastData]) => {
    console.log('✅ 天氣數據獲取成功');
    
    // 1. 獲取屯門溫度
    const tempData = currentData.temperature?.data || [];
    const tmuenTemp = tempData.find(item => item.place === '屯門');
    
    if (tmuenTemp) {
      document.getElementById('temperatureValue').textContent = tmuenTemp.value;
      console.log(`🌡️ 屯門溫度: ${tmuenTemp.value}°C`);
    } else {
      document.getElementById('temperatureValue').textContent = '--';
      console.warn('⚠️ 未找到屯門區溫度數據');
    }
    
    // 2. 更新天氣概況
    if (forecastData.generalSituation) {
      document.getElementById('weatherGeneral').textContent = forecastData.generalSituation;
    }
    
    // 3. 更新預報
    if (forecastData.forecastDesc) {
      let forecastText = '';
      if (forecastData.forecastPeriod) {
        forecastText += `${forecastData.forecastPeriod}\n`;
      }
      forecastText += forecastData.forecastDesc;
      document.getElementById('weatherForecast').textContent = forecastText;
    }
    
    // 4. 更新展望
    if (forecastData.outlook) {
      document.getElementById('weatherOutlook').textContent = forecastData.outlook;
    }
    
    // 5. 更新時間
    const updateTime = forecastData.updateTime || currentData.updateTime;
    if (updateTime) {
      try {
        const time = new Date(updateTime);
        const formattedTime = `${time.getFullYear()}-${(time.getMonth()+1).toString().padStart(2, '0')}-${time.getDate().toString().padStart(2, '0')} ${time.getHours().toString().padStart(2, '0')}:${time.getMinutes().toString().padStart(2, '0')}`;
        document.getElementById('temperatureTime').textContent = `更新時間：${formattedTime}`;
      } catch (e) {
        document.getElementById('temperatureTime').textContent = `更新時間：${updateTime}`;
      }
    }
    
    // 6. 顯示模態框
    const modalElement = document.getElementById('weatherModal');
    
    // 如果已經有模態框實例，先隱藏再創建新的
    if (currentWeatherModal) {
      currentWeatherModal.hide();
    }
    
    currentWeatherModal = new bootstrap.Modal(modalElement, {
      backdrop: 'static',
      keyboard: false
    });
    
    currentWeatherModal.show();
    console.log('✅ 天氣模態框已顯示');
    
    // ====================================
    // 滾動監聽功能 - 暫停自動關閉
    // ====================================
    const modalBody = modalElement.querySelector('.modal-body');
    const modalFooter = modalElement.querySelector('.modal-footer');
    const footerText = modalFooter.querySelector('#weatherFooterText');
    
    // 更新底部文字函數
    const updateFooterText = (text) => {
      footerText.textContent = text;
    };
    
    // 重置計時器函數
    const resetAutoHideTimer = () => {
      // 清除現有計時器
      if (weatherModalAutoHideTimer) {
        clearTimeout(weatherModalAutoHideTimer);
        weatherModalAutoHideTimer = null;
      }
      
      // 設置新的3秒計時器
      weatherModalAutoHideTimer = setTimeout(() => {
        if (currentWeatherModal) {
          currentWeatherModal.hide();
          console.log('✅ 天氣模態框已自動關閉');
        }
      }, 3000);
      
      // 更新底部文字
      updateFooterText('數據來源：香港天文台 • 3秒後自動關閉');
    };
    
    // 滾動事件處理
    const handleScroll = () => {
      if (!isUserScrolling) {
        isUserScrolling = true;
        console.log('🔄 用戶正在滾動，暫停自動關閉');
        
        // 清除自動關閉計時器
        if (weatherModalAutoHideTimer) {
          clearTimeout(weatherModalAutoHideTimer);
          weatherModalAutoHideTimer = null;
        }
        
        // 更新底部文字
        updateFooterText('用戶正在閱讀，自動關閉已暫停...');
      }
      
      // 清除現有的滾動計時器
      if (weatherModalScrollTimer) {
        clearTimeout(weatherModalScrollTimer);
      }
      
      // 設置滾動停止檢測計時器
      weatherModalScrollTimer = setTimeout(() => {
        isUserScrolling = false;
        console.log('⏱️ 用戶停止滾動，重新啟動3秒關閉計時器');
        resetAutoHideTimer();
      }, 1000); // 停止滾動1秒後重新計時
    };
    
    // 添加滾動事件監聽
    modalBody.addEventListener('scroll', handleScroll);
    
    // 鼠標互動事件
    modalElement.addEventListener('mouseenter', () => {
      console.log('🐭 鼠標進入模態框');
      // 鼠標進入時暫停計時
      if (weatherModalAutoHideTimer) {
        clearTimeout(weatherModalAutoHideTimer);
        weatherModalAutoHideTimer = null;
      }
      updateFooterText('鼠標懸停中，自動關閉已暫停');
    });
    
    modalElement.addEventListener('mouseleave', () => {
      console.log('🐭 鼠標離開模態框');
      // 鼠標離開時重新開始計時
      if (!isUserScrolling) {
        resetAutoHideTimer();
      }
    });
    
    // 模態框關閉時清理事件監聽
    const cleanupModalEvents = () => {
      console.log('🧹 清理滾動監聽器');
      modalBody.removeEventListener('scroll', handleScroll);
      
      // 清除所有計時器
      if (weatherModalAutoHideTimer) {
        clearTimeout(weatherModalAutoHideTimer);
        weatherModalAutoHideTimer = null;
      }
      if (weatherModalScrollTimer) {
        clearTimeout(weatherModalScrollTimer);
        weatherModalScrollTimer = null;
      }
      
      // 恢復原始文字
      updateFooterText('數據來源：香港天文台 • 自動關閉控制中');
      currentWeatherModal = null;
    };
    
    modalElement.addEventListener('hidden.bs.modal', cleanupModalEvents);
    
    // ====================================
    // 設置初始自動關閉計時器
    // ====================================
    resetAutoHideTimer();
    
  })
  .catch(error => {
    console.error('❌ 獲取天氣數據失敗:', error);
    
    // 顯示錯誤訊息
    document.getElementById('temperatureValue').textContent = '錯誤';
    document.getElementById('weatherGeneral').textContent = '無法連接天氣伺服器';
    document.getElementById('weatherForecast').textContent = '請檢查網絡連接或稍後再試';
    document.getElementById('weatherOutlook').textContent = '服務暫時不可用';
    document.getElementById('temperatureTime').textContent = '更新時間：失敗';
    
    // 仍然顯示模態框，但顯示錯誤信息
    const modalElement = document.getElementById('weatherModal');
    const weatherModal = new bootstrap.Modal(modalElement);
    
    weatherModal.show();
    
    // 錯誤時也添加滾動監聽（簡化版）
    const modalBody = modalElement.querySelector('.modal-body');
    let errorIsScrolling = false;
    let errorScrollTimer = null;
    let errorAutoHideTimer = null;
    
    const errorHandleScroll = () => {
      if (!errorIsScrolling) {
        errorIsScrolling = true;
        
        if (errorAutoHideTimer) {
          clearTimeout(errorAutoHideTimer);
          errorAutoHideTimer = null;
        }
        
        modalFooter.querySelector('small').textContent = '用戶正在閱讀，自動關閉已暫停...';
      }
      
      if (errorScrollTimer) clearTimeout(errorScrollTimer);
      errorScrollTimer = setTimeout(() => {
        errorIsScrolling = false;
        
        modalFooter.querySelector('small').textContent = '數據來源：香港天文台 • 3秒後自動關閉';
        
        errorAutoHideTimer = setTimeout(() => {
          if (weatherModal) {
            weatherModal.hide();
          }
        }, 3000);
      }, 1000);
    };
    
    modalBody.addEventListener('scroll', errorHandleScroll);
    
    // 3秒後自動關閉
    errorAutoHideTimer = setTimeout(() => {
      if (weatherModal) {
        weatherModal.hide();
      }
    }, 3000);
  });
}

// ==============================
// 事件監聽初始化
// ==============================

document.addEventListener('DOMContentLoaded', () => {
  const navLinks = document.querySelectorAll('.navbar-nav .nav-link');
  const navbarCollapse = document.getElementById('navbarNav');
  const bsCollapse = new bootstrap.Collapse(navbarCollapse, { toggle: false });

  // ====================================
  // 天氣按鈕點擊事件
  // ====================================
  const weatherToggleBtn = document.getElementById('weather-toggle-btn');
  if (weatherToggleBtn) {
    weatherToggleBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      console.log('☀️ 天氣按鈕被點擊，顯示天氣資訊');
      showWeatherModal();
    });
    
    // 添加按鈕動畫效果
    weatherToggleBtn.addEventListener('mouseenter', function() {
      this.style.transform = 'scale(1.1) rotate(15deg)';
    });
    
    weatherToggleBtn.addEventListener('mouseleave', function() {
      this.style.transform = 'scale(1) rotate(0deg)';
    });
  }
  
  // ====================================
  // 導航菜單點擊事件
  // ====================================
  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const id = link.getAttribute('data-id');
      const name = link.getAttribute('data-name');
      navLinks.forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      if (window.innerWidth < 992) bsCollapse.hide();

      if (id === 'geolocation') {
        manualSelection = false;
        lastPosition = null;
        refreshMessages(null, true);
      } else {
        manualSelection = true;
        history.replaceState(null, '', `?id=${id}&name=${encodeURIComponent(name)}`);
        refreshMessages(id, false);
      }
    });
  });

  // --- Initial load ---
  refreshMessages(null, true);
  
  // --- 初始化天氣模態框 (在輕鐵數據開始加載後) ---
  setTimeout(initializeWeatherModal, 500);

  // --- Auto refresh ---
  const debouncedRefresh = debounce((forceGeo) => refreshMessages(null, forceGeo), 500);
  setInterval(() => debouncedRefresh(false), 5000); // table refresh
  setInterval(() => { lastPosition = null; refreshMessages(null, true); }, 180000); // geo every 3 mins
});

// ==============================
// Wake Lock 功能
// ==============================

let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => requestWakeLock());
    } else enableIOSKeepAlive();
  } catch (err) {
    console.error(err.name, err.message);
  }
}

function enableIOSKeepAlive() {
  const video = document.createElement('video');
  video.setAttribute('playsinline','');
  video.setAttribute('muted','');
  video.setAttribute('loop','');
  video.style.position='absolute';
  video.style.width='1px';
