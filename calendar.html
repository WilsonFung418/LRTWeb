<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a73e8">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <title>百周年月曆</title>
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 8px;
        }
        
        .calendar-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 14px;
            padding: 12px 10px;
            margin-bottom: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .header h1 {
            margin: 0;
            color: #333;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .header p {
            margin: 4px 0 0;
            color: #666;
            font-size: 0.8rem;
        }
        
        .today-badge {
            background: linear-gradient(135deg, #4fc3f7, #1a73e8);
            color: white;
            padding: 5px 10px;
            border-radius: 25px;
            display: inline-block;
            margin-top: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            box-shadow: 0 4px 8px rgba(26,115,232,0.3);
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 6px 8px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
            text-align: center;
            flex: 1;
            min-width: 60px;
        }
        
        .stat-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a73e8;
            line-height: 1.2;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.65rem;
            margin-top: 2px;
        }
        
        .month-navigation {
            background: white;
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 8px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
        }
        
        .month-nav-btn {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
        }
        
        .month-nav-btn:active {
            opacity: 0.8;
        }
        
        .current-month {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }
        
        .today-btn {
            background: #4fc3f7;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        
        .today-btn:active {
            opacity: 0.8;
        }
        
        .filters {
            background: white;
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 8px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        
        .filters input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.85rem;
            background: #f8f9fa;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 8px 0;
            flex-wrap: wrap;
            padding: 6px;
            background: rgba(255,255,255,0.9);
            border-radius: 8px;
            backdrop-filter: blur(8px);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 0.65rem;
        }
        
        .legend-color {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        
        .legend-color.today { background: #4fc3f7; }
        .legend-color.tomorrow { background: #ffb74d; }
        .legend-color.week { background: #ba68c8; }
        .legend-color.month { background: #4db6ac; }
        
        .calendar-grid {
            background: white;
            border-radius: 10px;
            padding: 6px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            margin-bottom: 3px;
            text-align: center;
            font-weight: 600;
            color: #666;
            font-size: 0.7rem;
        }
        
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
        }
        
        .calendar-day {
            background: #f8f9fa;
            border-radius: 4px;
            padding: 3px 1px;
            min-height: 58px;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .calendar-day:active {
            background: #e0e0e0;
        }
        
        .calendar-day.other-month {
            opacity: 0.2;
            background: #f1f3f4;
        }
        
        .calendar-day.today {
            background: #e3f2fd;
            border: 2px solid #4fc3f7;
        }
        
        .day-number {
            font-weight: 600;
            color: #333;
            font-size: 0.75rem;
            margin-bottom: 1px;
            padding: 0 1px 1px 1px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .day-number .badge {
            background: #1a73e8;
            color: white;
            border-radius: 6px;
            padding: 1px 3px;
            font-size: 0.45rem;
            min-width: 12px;
            text-align: center;
        }
        
        .day-events {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1px;
            overflow: hidden;
        }
        
        .day-event-preview {
            background: white;
            border-radius: 2px;
            padding: 1px 2px;
            font-size: 0.55rem;
            border-left: 2px solid;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }
        
        .day-event-preview.today-event { border-left-color: #4fc3f7; }
        .day-event-preview.tomorrow-event { border-left-color: #ffb74d; }
        .day-event-preview.week-event { border-left-color: #ba68c8; }
        .day-event-preview.month-event { border-left-color: #4db6ac; }
        
        .more-events-badge {
            font-size: 0.5rem;
            color: #666;
            text-align: center;
            background: rgba(0,0,0,0.02);
            border-radius: 2px;
            margin-top: 1px;
        }
        
        .no-events-day {
            color: #999;
            font-size: 0.5rem;
            text-align: center;
            padding: 2px 0;
        }
        
        .loading {
            text-align: center;
            padding: 25px 12px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 日活動模態框 */
        .day-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .day-modal-content {
            background: white;
            border-radius: 16px;
            padding: 20px;
            max-width: 350px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .day-modal-close {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f0f0f0;
        }
        
        .day-modal-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-right: 30px;
        }
        
        .day-event-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border-left: 4px solid;
        }
        
        .day-event-item.today-event { border-left-color: #4fc3f7; }
        .day-event-item.tomorrow-event { border-left-color: #ffb74d; }
        .day-event-item.week-event { border-left-color: #ba68c8; }
        .day-event-item.month-event { border-left-color: #4db6ac; }
        
        .day-event-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .day-event-title small {
            font-weight: 400;
            color: #666;
            font-size: 0.8rem;
        }
        
        .day-event-desc {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 4px;
            white-space: pre-wrap;
        }
        
        .day-event-location {
            color: #1a73e8;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .back-button {
            position: fixed;
            bottom: 8px;
            right: 8px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 8px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(26,115,232,0.4);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 4px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .back-button:active {
            transform: scale(0.95);
        }
        
        /* 手機專用調整 */
        @media (max-width: 480px) {
            body {
                padding: 4px;
            }
            
            .header h1 {
                font-size: 1.4rem;
            }
            
            .stat-card {
                padding: 5px 6px;
            }
            
            .stat-number {
                font-size: 1.1rem;
            }
            
            .month-navigation {
                padding: 5px;
            }
            
            .month-nav-btn, .today-btn {
                padding: 5px 6px;
                font-size: 0.7rem;
            }
            
            .current-month {
                font-size: 0.9rem;
            }
            
            .calendar-day {
                min-height: 52px;
                padding: 2px 1px;
            }
            
            .day-number {
                font-size: 0.7rem;
            }
            
            .day-number .badge {
                padding: 1px 2px;
                font-size: 0.4rem;
                min-width: 10px;
            }
            
            .day-event-preview {
                font-size: 0.5rem;
                padding: 1px 1px;
            }
            
            .legend-item {
                font-size: 0.6rem;
            }
            
            .back-button {
                bottom: 6px;
                right: 6px;
                padding: 6px 12px;
                font-size: 0.75rem;
            }
        }
        
        @supports (padding-top: env(safe-area-inset-top)) {
            .back-button {
                bottom: calc(8px + env(safe-area-inset-bottom));
                right: calc(8px + env(safe-area-inset-right));
            }
        }
        
        @media (display-mode: standalone) {
            body {
                padding-top: env(safe-area-inset-top);
            }
            
            .back-button {
                bottom: calc(8px + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="header">
            <h1>📅 百周年月曆</h1>
            <p>㩒日子睇全日活動</p>
            
            <div class="today-badge" id="today-badge">
                <i class="bi bi-calendar-check"></i>
                載入中...
            </div>
        </div>
        
        <div id="stats-container" class="stats"></div>
        
        <div class="month-navigation">
            <button class="month-nav-btn" onclick="changeMonth(-1)" id="prev-month">
                <i class="bi bi-chevron-left"></i> <span>上月</span>
            </button>
            
            <div class="current-month" id="current-month-display"></div>
            
            <div style="display: flex; gap: 4px;">
                <button class="today-btn" onclick="goToToday()">
                    <i class="bi bi-calendar-check"></i> <span>今日</span>
                </button>
                <button class="month-nav-btn" onclick="changeMonth(1)" id="next-month">
                    <span>下月</span> <i class="bi bi-chevron-right"></i>
                </button>
            </div>
        </div>
        
        <div class="filters">
            <input type="text" id="search-input" placeholder="🔍 搜尋活動..." autocomplete="off">
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color today"></div>
                <span>今日</span>
            </div>
            <div class="legend-item">
                <div class="legend-color tomorrow"></div>
                <span>明日</span>
            </div>
            <div class="legend-item">
                <div class="legend-color week"></div>
                <span>本週</span>
            </div>
            <div class="legend-item">
                <div class="legend-color month"></div>
                <span>本月</span>
            </div>
        </div>
        
        <div id="calendar-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>載入月曆中...</p>
            </div>
        </div>
    </div>
    
    <!-- 日活動模態框 -->
    <div class="day-modal" id="day-modal" onclick="closeDayModalOnClick(event)">
        <div class="day-modal-content">
            <span class="day-modal-close" onclick="closeDayModal()">&times;</span>
            <div id="day-modal-content"></div>
        </div>
    </div>
    
    <button class="back-button" onclick="goBack()">
        <i class="bi bi-arrow-left"></i>
        <span>主頁</span>
    </button>
    
    <script>
        // ==============================
        // 翻譯詞典
        // ==============================
        const translationDict = {
            'January': '一月', 'February': '二月', 'March': '三月', 'April': '四月',
            'May': '五月', 'June': '六月', 'July': '七月', 'August': '八月',
            'September': '九月', 'October': '十月', 'November': '十一月', 'December': '十二月',
            
            'Monday': '星期一', 'Tuesday': '星期二', 'Wednesday': '星期三', 'Thursday': '星期四',
            'Friday': '星期五', 'Saturday': '星期六', 'Sunday': '星期日',
            
            'Parents’ Days': '家長日',
            'Interim Prize-giving Ceremony': '中期頒獎典禮',
            'PLK Inter-schools Athletics Meet': '保良局校際田徑比賽',
            'Swimming Gala': '游泳比賽',
            'F.6 Mock Examination': '中六模擬考試',
            'Study Leave': '溫習假',
            'Staff Development Day': '教職員發展日',
            'Global Study Week': '環球學習週',
            'Reading Week': '閱讀週',
            'TSA': '全港性系統評估',
            'SSPA DP Interview': '中學學位分配面試',
            'Homecoming Day': '返校日',
            'Information Day': '資訊日',
            'Graduation Day': '畢業典禮',
            'Chinese Culture Week': '中華文化週',
            'Summer Vacation': '暑假',
            'Easter Holidays': '復活節假期',
            'Ching Ming Festival': '清明節',
            'Labour Day': '勞動節',
            'Buddha’s Birthday': '佛誕',
            'Tuen Ng Festival': '端午節',
            'National Day': '國慶日',
            'Chung Yeung Festival': '重陽節',
            'Christmas & New Year Holidays': '聖誕及新年假期',
            'Lunar New Year Holiday': '農曆新年假期',
            
            'AM': '上午', 'PM': '下午'
        };
        
        function translateText(text) {
            if (!text) return text;
            return translationDict[text] || text;
        }
        
        // ==============================
        // ICS 解析
        // ==============================
        async function fetchCalendarEvents() {
            try {
                const response = await fetch('calendar.ics?_=' + Date.now());
                if (!response.ok) {
                    throw new Error('無法讀取行事曆檔案');
                }
                const icsText = await response.text();
                return parseICS(icsText);
            } catch (error) {
                console.error('讀取行事曆失敗:', error);
                return [];
            }
        }
        
        function parseICS(icsText) {
            const events = [];
            const lines = icsText.split('\n');
            
            let currentEvent = null;
            let inEvent = false;
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                while (i + 1 < lines.length && (lines[i + 1].startsWith(' ') || lines[i + 1].startsWith('\t'))) {
                    line += lines[i + 1].trim();
                    i++;
                }
                
                if (line === 'BEGIN:VEVENT') {
                    inEvent = true;
                    currentEvent = {
                        summary: '',
                        summary_en: '',
                        description: '',
                        location: '',
                        dtstart: null,
                        dtend: null
                    };
                    continue;
                }
                
                if (line === 'END:VEVENT') {
                    if (currentEvent && currentEvent.dtstart) {
                        currentEvent.summary_en = currentEvent.summary;
                        currentEvent.summary = translateText(currentEvent.summary);
                        
                        if (currentEvent.location) {
                            currentEvent.location = translateText(currentEvent.location);
                        }
                        
                        events.push(currentEvent);
                    }
                    inEvent = false;
                    currentEvent = null;
                    continue;
                }
                
                if (!inEvent || !currentEvent) continue;
                
                if (line.startsWith('SUMMARY:')) {
                    currentEvent.summary = line.substring(8).replace(/\\,/g, ',').replace(/\\n/g, ' ').replace(/\\/g, '');
                }
                else if (line.startsWith('LOCATION:')) {
                    currentEvent.location = line.substring(9).replace(/\\,/g, ',').replace(/\\n/g, ' ').replace(/\\/g, '');
                }
                else if (line.startsWith('DESCRIPTION:')) {
                    currentEvent.description = line.substring(12).replace(/\\n/g, '\n').replace(/\\,/g, ',').replace(/\\/g, '');
                }
                else if (line.startsWith('DTSTART;VALUE=DATE:')) {
                    const dateStr = line.substring(19).trim();
                    if (dateStr && dateStr.length === 8) {
                        const year = parseInt(dateStr.substring(0, 4));
                        const month = parseInt(dateStr.substring(4, 6)) - 1;
                        const day = parseInt(dateStr.substring(6, 8));
                        currentEvent.dtstart = new Date(year, month, day);
                    }
                }
                else if (line.startsWith('DTEND;VALUE=DATE:')) {
                    const dateStr = line.substring(17).trim();
                    if (dateStr && dateStr.length === 8) {
                        const year = parseInt(dateStr.substring(0, 4));
                        const month = parseInt(dateStr.substring(4, 6)) - 1;
                        const day = parseInt(dateStr.substring(6, 8));
                        currentEvent.dtend = new Date(year, month, day);
                    }
                }
            }
            
            return events;
        }
        
        // ==============================
        // 截字函數 (中文3字)
        // ==============================
        function truncateText(text, maxChinese, maxEnglish) {
            if (!text) return '';
            
            // 檢測是否包含中文字
            const hasChinese = /[\u4e00-\u9fff]/.test(text);
            
            if (hasChinese) {
                // 中文：截 maxChinese 個字
                if (text.length > maxChinese) {
                    return text.substring(0, maxChinese) + '…';
                }
            } else {
                // 英文：截 maxEnglish 個字
                if (text.length > maxEnglish) {
                    return text.substring(0, maxEnglish) + '…';
                }
            }
            return text;
        }
        
        // ==============================
        // 月曆顯示
        // ==============================
        let allEvents = [];
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let currentSearchTerm = '';
        
        async function loadCalendar() {
            const content = document.getElementById('calendar-content');
            
            try {
                allEvents = await fetchCalendarEvents();
                
                if (allEvents.length === 0) {
                    content.innerHTML = `
                        <div class="no-events" style="padding:30px;">
                            <i class="bi bi-calendar-x" style="font-size: 2.5rem; color: #ccc;"></i>
                            <h3 style="font-size:1.2rem;">暫無行事曆資料</h3>
                            <p style="font-size:0.9rem;">請確認 calendar.ics 檔案是否存在</p>
                        </div>
                    `;
                    return;
                }
                
                updateStats();
                renderMonth();
                updateTodayBadge();
                
            } catch (error) {
                content.innerHTML = `
                    <div class="no-events" style="padding:30px;">
                        <i class="bi bi-exclamation-triangle" style="font-size: 2.5rem; color: #ff6b6b;"></i>
                        <h3 style="font-size:1.2rem;">載入失敗</h3>
                        <p style="font-size:0.9rem;">${error.message}</p>
                    </div>
                `;
            }
        }
        
        function updateStats() {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            const totalEvents = allEvents.length;
            const monthEvents = allEvents.filter(e => 
                e.dtstart && e.dtstart.getMonth() === currentMonth && e.dtstart.getFullYear() === currentYear
            ).length;
            const upcomingEvents = allEvents.filter(e => 
                e.dtstart && e.dtstart >= today
            ).length;
            
            document.getElementById('stats-container').innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${totalEvents}</div>
                    <div class="stat-label">全年</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${monthEvents}</div>
                    <div class="stat-label">本月</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${upcomingEvents}</div>
                    <div class="stat-label">即將</div>
                </div>
            `;
        }
        
        function updateTodayBadge() {
            const today = new Date();
            const todayEvents = getEventsForDate(today.getFullYear(), today.getMonth(), today.getDate());
            
            document.getElementById('today-badge').innerHTML = `
                <i class="bi bi-calendar-check"></i>
                今日 ${todayEvents.length} 項活動
            `;
        }
        
        function getEventCategory(eventDate) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const eventDay = new Date(eventDate.getFullYear(), eventDate.getMonth(), eventDate.getDate());
            
            const diffDays = Math.floor((eventDay - today) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'today-event';
            if (diffDays === 1) return 'tomorrow-event';
            if (diffDays <= 7) return 'week-event';
            if (eventDate.getMonth() === today.getMonth()) return 'month-event';
            return '';
        }
        
        function getEventsForDate(year, month, day) {
            const date = new Date(year, month, day);
            
            return allEvents.filter(e => {
                if (!e.dtstart) return false;
                
                const eventStart = new Date(e.dtstart);
                let eventEnd = e.dtend ? new Date(e.dtend) : new Date(eventStart);
                eventEnd.setDate(eventEnd.getDate() - 1);
                
                return date >= eventStart && date <= eventEnd;
            }).filter(e => {
                if (!currentSearchTerm) return true;
                const searchLower = currentSearchTerm.toLowerCase();
                return e.summary.toLowerCase().includes(searchLower) ||
                       (e.description && e.description.toLowerCase().includes(searchLower)) ||
                       (e.location && e.location.toLowerCase().includes(searchLower));
            });
        }
        
        function renderMonth() {
            const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            document.getElementById('current-month-display').textContent = `${currentYear} ${monthNames[currentMonth]}`;
            
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            
            const startDay = firstDay.getDay();
            const totalDays = lastDay.getDate();
            
            const today = new Date();
            const isCurrentMonth = today.getMonth() === currentMonth && today.getFullYear() === currentYear;
            
            let daysHtml = '';
            
            // 上個月嘅空白日
            for (let i = 0; i < startDay; i++) {
                daysHtml += `<div class="calendar-day other-month"></div>`;
            }
            
            // 當月嘅日子
            for (let d = 1; d <= totalDays; d++) {
                const events = getEventsForDate(currentYear, currentMonth, d);
                const isToday = isCurrentMonth && d === today.getDate();
                
                daysHtml += `<div class="calendar-day ${isToday ? 'today' : ''}" onclick="showDayEvents(${currentYear}, ${currentMonth}, ${d})">`;
                daysHtml += `<div class="day-number">`;
                daysHtml += `<span>${d}</span>`;
                if (events.length > 0) {
                    daysHtml += `<span class="badge">${events.length}</span>`;
                }
                daysHtml += `</div>`;
                
                daysHtml += `<div class="day-events">`;
                
                if (events.length > 0) {
                    // 只顯示頭1個活動嘅預覽
                    const event = events[0];
                    const category = getEventCategory(event.dtstart);
                    const truncatedSummary = truncateText(event.summary, 3, 6); // 中文3字，英文6字
                    daysHtml += `
                        <div class="day-event-preview ${category}">
                            ${truncatedSummary}
                        </div>
                    `;
                    
                    if (events.length > 1) {
                        daysHtml += `<div class="more-events-badge">+${events.length-1}</div>`;
                    }
                } else {
                    daysHtml += `<div class="no-events-day">-</div>`;
                }
                
                daysHtml += `</div>`;
                daysHtml += `</div>`;
            }
            
            document.getElementById('calendar-content').innerHTML = `
                <div class="calendar-grid">
                    <div class="weekdays">
                        <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                    </div>
                    <div class="days-grid">
                        ${daysHtml}
                    </div>
                </div>
            `;
        }
        
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderMonth();
            updateStats();
        }
        
        function goToToday() {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderMonth();
            updateStats();
            updateTodayBadge();
        }
        
        function showDayEvents(year, month, day) {
            const events = getEventsForDate(year, month, day);
            const modal = document.getElementById('day-modal');
            const content = document.getElementById('day-modal-content');
            
            if (events.length === 0) {
                content.innerHTML = `
                    <div class="day-modal-title">${year}年${month+1}月${day}日</div>
                    <div style="text-align:center; padding:20px; color:#666;">今日沒有活動</div>
                `;
            } else {
                let eventsHtml = `<div class="day-modal-title">${year}年${month+1}月${day}日 (共${events.length}項)</div>`;
                
                events.forEach(event => {
                    const category = getEventCategory(event.dtstart);
                    const showOriginal = event.summary_en && event.summary_en !== event.summary;
                    
                    eventsHtml += `
                        <div class="day-event-item ${category}">
                            <div class="day-event-title">
                                ${event.summary}
                                ${showOriginal ? `<br><small>EN: ${event.summary_en}</small>` : ''}
                            </div>
                    `;
                    
                    if (event.description) {
                        eventsHtml += `<div class="day-event-desc">${event.description}</div>`;
                    }
                    
                    if (event.location) {
                        eventsHtml += `
                            <div class="day-event-location">
                                <i class="bi bi-geo-alt"></i>
                                ${event.location}
                            </div>
                        `;
                    }
                    
                    eventsHtml += `</div>`;
                });
                
                content.innerHTML = eventsHtml;
            }
            
            modal.style.display = 'flex';
        }
        
        function closeDayModal() {
            document.getElementById('day-modal').style.display = 'none';
        }
        
        function closeDayModalOnClick(event) {
            if (event.target === document.getElementById('day-modal')) {
                closeDayModal();
            }
        }
        
        function goBack() {
            window.location.href = '/';
        }
        
        // 監聽搜尋
        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearchTerm = e.target.value;
            renderMonth();
        });
        
        // 載入月曆
        loadCalendar();
    </script>
</body>
</html>
